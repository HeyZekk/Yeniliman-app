<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeniliman — Maliyet Takip</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f6f5f2;--bg3:#eceae4;
  --ink:#23201c;--ink2:#6f6a62;--ink3:#a39d92;
  --line:#e4e1da;--line2:#d0ccc2;
  --sea:#0d7878;--sea-bg:#e6f4f3;--sea-border:#a8ddd9;--sea-ink:#085656;
  --green:#1a7a44;--green-bg:#eaf6ee;--green-border:#b3ddc2;
  --amber:#9a6410;--amber-bg:#fdf3e3;--amber-border:#f0d6a3;
  --red:#a8322c;--red-bg:#fbecea;--red-border:#f0bdb8;
  --gold:#b8893a;
  --r:12px;--r-sm:8px;--r-lg:16px;
  --text:#23201c;--text2:#6f6a62;--text3:#a39d92;--border:#e4e1da;--radius-sm:8px;--blue:#0d7878;
  --shadow:0 1px 2px rgba(35,32,28,0.04),0 2px 8px rgba(35,32,28,0.05);
  --shadow-lg:0 8px 30px rgba(35,32,28,0.12);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg2);color:var(--ink);font-size:14px;min-height:100vh;-webkit-font-smoothing:antialiased}
#app{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:228px;flex-shrink:0;background:var(--bg);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:20px 14px}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 20px}
.brand-logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--sea),#0a5f5f);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.brand-txt h1{font-size:15px;font-weight:700;letter-spacing:-0.2px;line-height:1.1}
.brand-txt span{font-size:11px;color:var(--ink2)}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;font-size:13.5px;font-weight:500;color:var(--ink2);margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:all 0.12s}
.nav-item:hover{background:var(--bg2);color:var(--ink)}
.nav-item.active{background:var(--sea-bg);color:var(--sea-ink);font-weight:600}
.nav-item .ico{font-size:16px;width:18px;text-align:center;flex-shrink:0}
.nav-item .ct{margin-left:auto;font-size:11px;font-weight:600;color:var(--ink3);background:var(--bg3);padding:1px 7px;border-radius:10px}
.nav-item.active .ct{background:var(--bg);color:var(--sea)}
.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:6px}
.sidebar-foot .btn{justify-content:flex-start;font-size:12.5px;padding:8px 12px;border:none;color:var(--ink2)}
.sidebar-foot .btn:hover{background:var(--bg2);color:var(--ink)}

/* ── MAIN ── */
.main{flex:1;min-width:0;padding:28px 36px;max-width:1180px}
.page-head{margin-bottom:24px}
.page-head h2{font-size:23px;font-weight:700;letter-spacing:-0.4px}
.page-head p{color:var(--ink2);font-size:13.5px;margin-top:3px}
.page{display:none}.page.active{display:block;animation:fade 0.25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.card{background:var(--bg);border:1px solid var(--line);border-radius:var(--r);padding:22px;margin-bottom:18px;box-shadow:var(--shadow)}
.card-title{font-size:15px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 16px;font-size:13px;font-weight:600;border:1px solid var(--line2);border-radius:var(--r-sm);background:var(--bg);color:var(--ink);cursor:pointer;transition:all 0.12s;white-space:nowrap}
.btn:hover{background:var(--bg2);border-color:var(--ink3)}
.btn.primary{background:var(--sea);color:#fff;border-color:var(--sea)}
.btn.primary:hover{background:#0a6363;border-color:#0a6363}
.btn.danger{color:var(--red);border-color:var(--red-border)}
.btn.danger:hover{background:var(--red-bg)}
.btn.sm{padding:6px 11px;font-size:12px;font-weight:500}
.btn.ghost{border-color:transparent;color:var(--ink2)}
.btn.ghost:hover{background:var(--bg2)}

input,select,textarea{font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--bg);border:1px solid var(--line2);border-radius:var(--r-sm);padding:10px 12px;width:100%;outline:none;transition:all 0.12s}
input:focus,select:focus,textarea:focus{border-color:var(--sea);box-shadow:0 0 0 3px var(--sea-bg)}
input::placeholder{color:var(--ink3)}
textarea{resize:vertical;min-height:140px;font-family:ui-monospace,SFMono-Regular,monospace;font-size:12px;line-height:1.6}
label{font-size:12px;color:var(--ink2);display:block;margin-bottom:6px;margin-top:16px;font-weight:600}
label:first-child{margin-top:0}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

.metric{background:var(--bg);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--shadow)}
.metric .lbl{font-size:12px;color:var(--ink2);font-weight:500;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.metric .val{font-size:27px;font-weight:700;line-height:1;letter-spacing:-0.5px}
.metric .val.sm{font-size:17px}

table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;font-weight:700;color:var(--ink2);padding:11px 14px;border-bottom:1px solid var(--line);text-transform:uppercase;letter-spacing:0.04em;background:var(--bg2)}
td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background 0.1s}
tbody tr:hover td{background:var(--bg2)}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge.ok{background:var(--green-bg);color:var(--green)}
.badge.warn{background:var(--amber-bg);color:var(--amber)}
.badge.bad{background:var(--red-bg);color:var(--red)}
.badge.info{background:var(--sea-bg);color:var(--sea-ink)}
.badge.neutral{background:var(--bg3);color:var(--ink2)}

.empty{text-align:center;padding:56px 20px;color:var(--ink3)}
.empty svg{margin-bottom:14px;opacity:0.35}
.empty .big{font-size:15px;font-weight:600;color:var(--ink2);margin-bottom:4px}

.modal-bg{position:fixed;inset:0;background:rgba(35,32,28,0.45);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fade 0.15s ease}
.modal{background:var(--bg);border-radius:var(--r-lg);width:min(580px,100%);max-height:90vh;overflow-y:auto;position:relative;box-shadow:var(--shadow-lg)}
.modal-head{position:sticky;top:0;background:var(--bg);padding:22px 26px 16px;border-bottom:1px solid var(--line);z-index:2}
.modal-head h3{font-size:17px;font-weight:700}
.modal-body{padding:22px 26px}
.modal-foot{position:sticky;bottom:0;background:var(--bg);padding:16px 26px;border-top:1px solid var(--line);display:flex;gap:10px}
.modal-close{position:absolute;top:20px;right:22px;background:var(--bg2);border:none;width:30px;height:30px;border-radius:8px;font-size:18px;cursor:pointer;color:var(--ink2);line-height:1;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.modal-close:hover{background:var(--bg3);color:var(--ink)}

.row-line{display:flex;gap:8px;align-items:flex-end;margin-bottom:8px}
.row-line>div{flex:1}
.ing-row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.ing-row .qty{max-width:90px;text-align:right}
.ing-row .unit{min-width:38px;font-size:12px;color:var(--ink2);text-align:left}
.ing-row .line-total{min-width:78px;font-size:13px;color:var(--ink);text-align:right;font-weight:600}
.combo{position:relative;flex:2}
.combo-input{width:100%}
.combo-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg);border:1px solid var(--line2);border-radius:var(--r-sm);box-shadow:var(--shadow-lg);max-height:260px;overflow-y:auto;z-index:50}
.combo-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 13px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bg2)}
.combo-item:last-child{border-bottom:none}
.combo-item:hover{background:var(--sea-bg)}
.combo-sub{font-size:11px;color:var(--ink2);white-space:nowrap;font-variant-numeric:tabular-nums}
.combo-empty{padding:14px;font-size:12px;color:var(--ink3);text-align:center}

.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.info-box{background:var(--sea-bg);border:1px solid var(--sea-border);border-radius:var(--r-sm);padding:13px 16px;font-size:13px;color:var(--sea-ink);margin-bottom:18px;line-height:1.55}
.warn-box{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r-sm);padding:13px 16px;font-size:13px;color:var(--amber);margin-bottom:18px;line-height:1.55}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--sea);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.upload-zone{border:2px dashed var(--line2);border-radius:var(--r);padding:40px;text-align:center;cursor:pointer;transition:all 0.15s;color:var(--ink2)}
.upload-zone:hover{border-color:var(--sea);color:var(--sea);background:var(--sea-bg)}
.upload-zone svg{display:block;margin:0 auto 12px;opacity:0.5}
.cost-bar-bg{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:8px}
.cost-bar{height:6px;border-radius:3px;transition:width 0.3s}
.onay-kalem{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line)}
.onay-kalem:last-child{border-bottom:none}
.onay-kalem input[type=checkbox]{width:17px;height:17px;cursor:pointer;flex-shrink:0;accent-color:var(--sea)}
.onay-kalem .kd{flex:1;min-width:0}
.onay-kalem .kd strong{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.onay-kalem .kd span{font-size:12px;color:var(--ink2)}
.search-box{position:relative;margin-bottom:18px;max-width:380px}
.search-box input{padding-left:38px}
.search-box::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;opacity:0.6}
.cost-ok{color:var(--green)}
.cost-warn{color:var(--amber)}
.cost-bad{color:var(--red)}
.step{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.step-n{width:27px;height:27px;border-radius:50%;background:var(--sea);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sep{border:none;border-top:1px solid var(--line);margin:22px 0}
#api-key-bar{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r-sm);padding:13px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
#api-key-bar span{font-size:13px;color:var(--amber);flex:1;font-weight:500}
#api-key-bar input{max-width:300px;margin:0}
.progress{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:12px}
.progress-bar{height:5px;background:var(--sea);border-radius:3px;transition:width 0.4s}
.num{font-variant-numeric:tabular-nums}
.live-calc{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-radius:var(--r-sm);overflow:hidden;margin-top:14px}
.live-calc>div{background:var(--bg2);padding:14px}
.live-calc .lc-lbl{font-size:11px;color:var(--ink2);font-weight:600;margin-bottom:5px}
.live-calc .lc-val{font-size:18px;font-weight:700;letter-spacing:-0.3px}

@media(max-width:820px){
  #app{flex-direction:column}
  .sidebar{width:100%;height:auto;position:relative;flex-direction:row;flex-wrap:wrap;padding:12px;gap:4px}
  .brand{width:100%;padding:4px 8px 12px}
  .nav-item{width:auto}
  .nav-item .ct{display:none}
  .sidebar-foot{flex-direction:row;border-top:none;width:100%;padding-top:0}
  .main{padding:20px}
}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">🍽</div>
      <div class="brand-txt"><h1>Yeniliman</h1><span>Maliyet & Reçete</span></div>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-foot">
      <button class="btn" onclick="yedekAl()">⬇ Yedek Al</button>
      <button class="btn" onclick="document.getElementById('restore-file').click()">⬆ Geri Yükle</button>
      <input type="file" id="restore-file" accept=".json" style="display:none" onchange="yedekYukle(this)">
    </div>
  </aside>

  <main class="main">
    <div id="api-key-bar">
      <span>⚠️ Anthropic API Key gir (AI özellikleri için gerekli)</span>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." style="max-width:280px">
      <button class="btn primary" onclick="saveApiKey()">Kaydet</button>
    </div>
    <div id="page-container"></div>
  </main>
</div>

<script>
const TABS=[
  {id:'dashboard',label:'Özet',ico:'📊'},
  {id:'fatura',label:'Faturalar',ico:'🧾'},
  {id:'malzeme',label:'Malzemeler',ico:'📦'},
  {id:'recete',label:'Reçeteler',ico:'👨‍🍳'},
  {id:'menu',label:'Menü & Fiyat',ico:'🍴'},
];

let DB={malzeme:[],fatura:[],recete:[],menu_items:[]};
let activeTab='fatura';
let apiKey=localStorage.getItem('yn_api_key')||'';

function saveApiKey(){
  const v=document.getElementById('api-key-input').value.trim();
  if(!v){alert('API Key boş olamaz.');return;}
  apiKey=v;
  localStorage.setItem('yn_api_key',v);
  document.getElementById('api-key-bar').style.display='none';
  alert('✓ API Key kaydedildi.');
}

function loadDB(){
  try{const d=localStorage.getItem('yn_db');if(d)DB=JSON.parse(d);}catch(e){}
  if(apiKey)document.getElementById('api-key-bar').style.display='none';
  else document.getElementById('api-key-input').value='';
  render();
}

function saveDB(){
  try{localStorage.setItem('yn_db',JSON.stringify(DB));}catch(e){alert('Depolama hatası: '+e.message);}
}

function yedekAl(){
  const data=JSON.stringify(DB,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const tarih=new Date().toISOString().slice(0,10);
  a.href=url;a.download=`yeniliman-yedek-${tarih}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function yedekYukle(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const veri=JSON.parse(r.result);
      if(!veri.malzeme||!veri.recete){alert('Geçersiz yedek dosyası.');return;}
      if(!confirm('Mevcut tüm veriler bu yedekle değiştirilecek. Devam edilsin mi?'))return;
      DB={malzeme:veri.malzeme||[],fatura:veri.fatura||[],recete:veri.recete||[],menu_items:veri.menu_items||[]};
      saveDB();render();
      alert('✓ Yedek geri yüklendi.');
    }catch(e){alert('Dosya okunamadı: '+e.message);}
    input.value='';
  };
  r.readAsText(file);
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fmt(n,d=2){return Number(n||0).toLocaleString('tr-TR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtTL(n){return '₺'+fmt(n);}
function costColor(p){return p<=32?'cost-ok':p<=40?'cost-warn':'cost-bad';}
function costBadge(p){return p<=32?'ok':p<=40?'warn':'bad';}
function hesapla(r,_seen){
  if(!r)return 0;
  _seen=_seen||{};
  if(_seen[r.id])return 0; // sonsuz döngü koruması
  _seen[r.id]=true;
  let toplam=0;
  (r.malzemeler||[]).forEach(rm=>{
    const m=DB.malzeme.find(x=>x.id===rm.malzeme_id);
    if(m&&m.son_fiyat>0)toplam+=m.son_fiyat*rm.miktar;
  });
  (r.alt_receteler||[]).forEach(ar=>{
    const sub=DB.recete.find(x=>x.id===ar.recete_id);
    if(sub){
      const subToplam=hesapla(sub,{..._seen});
      const subPorsiyon=sub.porsiyon||1;
      // alt reçetenin birim maliyeti × kullanılan miktar
      toplam+=(subToplam/subPorsiyon)*ar.miktar;
    }
  });
  return toplam;
}

// Bir reçetenin tek porsiyon/birim maliyeti
function birimMaliyet(r){
  if(!r)return 0;
  return hesapla(r)/(r.porsiyon||1);
}

function renderNav(){
  const counts={dashboard:'',fatura:DB.fatura.length,malzeme:DB.malzeme.length,recete:DB.recete.length,menu:DB.menu_items.length};
  document.getElementById('nav').innerHTML=TABS.map(t=>{
    const c=counts[t.id];
    return `<button class="nav-item${t.id===activeTab?' active':''}" onclick="switchTab('${t.id}')">
      <span class="ico">${t.ico}</span><span>${t.label}</span>${c!==''&&c>0?`<span class="ct">${c}</span>`:''}
    </button>`;
  }).join('');
}

function switchTab(id){activeTab=id;render();}

function render(){
  renderNav();
  const c=document.getElementById('page-container');
  if(activeTab==='dashboard')c.innerHTML=renderDashboard();
  else if(activeTab==='fatura')c.innerHTML=renderFatura();
  else if(activeTab==='malzeme')c.innerHTML=renderMalzeme();
  else if(activeTab==='recete')c.innerHTML=renderRecete();
  else if(activeTab==='menu')c.innerHTML=renderMenu();
}

/* ── DASHBOARD ── */
function renderDashboard(){
  let ac=0,cc=0;
  DB.menu_items.forEach(m=>{
    const r=DB.recete.find(x=>x.id===m.recete_id);
    if(r&&m.fiyat>0){ac+=(hesapla(r)/m.fiyat)*100;cc++;}
  });
  const avg=cc>0?ac/cc:0;

  // En karlı ve en zayıf ürünler
  const analiz=DB.menu_items.map(m=>{
    const r=DB.recete.find(x=>x.id===m.recete_id);
    const mc=r?hesapla(r):0;
    const pct=m.fiyat>0?(mc/m.fiyat)*100:0;
    return {...m,mc,pct,kar:m.fiyat-mc};
  });
  const sorunlu=analiz.filter(a=>a.pct>40).length;

  const tableRows=analiz.length===0
    ?`<tr><td colspan="5"><div class="empty"><div class="big">Henüz menü ürünü yok</div>Reçete kurup menüye bağlayınca karlılık burada görünecek</div></td></tr>`
    :analiz.sort((a,b)=>b.pct-a.pct).map(m=>`<tr>
        <td><strong>${m.ad}</strong>${m.kategori?`<br><small style="color:var(--ink2)">${m.kategori}</small>`:''}</td>
        <td class="num">${fmtTL(m.mc)}</td>
        <td class="num"><strong>${fmtTL(m.fiyat)}</strong></td>
        <td class="num ${m.kar>=0?'cost-ok':'cost-bad'}">${fmtTL(m.kar)}</td>
        <td><span class="badge ${costBadge(m.pct)}">%${fmt(m.pct,1)}</span></td>
      </tr>`).join('');

  return `<div class="page active">
    <div class="page-head"><h2>Genel Bakış</h2><p>Yeniliman Restaurant · maliyet ve karlılık özeti</p></div>
    <div class="grid4" style="margin-bottom:18px">
      <div class="metric"><div class="lbl">📦 Malzeme</div><div class="val num">${DB.malzeme.length}</div></div>
      <div class="metric"><div class="lbl">👨‍🍳 Reçete</div><div class="val num">${DB.recete.length}</div></div>
      <div class="metric"><div class="lbl">🍴 Menü ürünü</div><div class="val num">${DB.menu_items.length}</div></div>
      <div class="metric"><div class="lbl">📊 Ort. food cost</div><div class="val num ${costColor(avg)}">%${fmt(avg,1)}</div></div>
    </div>
    ${sorunlu>0?`<div class="warn-box">⚠️ ${sorunlu} ürünün food cost'u %40'ın üzerinde. Bu ürünlerin fiyatını gözden geçirmek isteyebilirsin.</div>`:''}
    <div class="card">
      <div class="card-title">Menü Karlılığı <span class="badge info">Hedef ≤ %32</span> <span class="badge neutral">yüksekten düşüğe</span></div>
      <table>
        <thead><tr><th>Ürün</th><th>Maliyet</th><th>Satış</th><th>Kar</th><th>Food Cost</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  </div>`;
}

/* ── FATURA ── */

function setProgress(pct,msg){
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('fatura-msg').textContent=msg;
}

async function uploadFatura(input){
  const file=input.files[0];
  if(!file)return;
  if(!apiKey){alert('Önce API Key gir.');return;}

  document.getElementById('fatura-progress').style.display='block';
  document.getElementById('oku-btn').disabled=true;
  setProgress(20,'Dosya okunuyor...');

  try{
    const b64=await fileToBase64(file);
    setProgress(40,'AI analiz ediyor...');

    const isImg=file.type.startsWith('image/');
    const isPDF=file.type==='application/pdf';
    let msgContent;
    if(isImg){
      msgContent=[
        {type:'image',source:{type:'base64',media_type:file.type,data:b64}},
        {type:'text',text:buildPrompt()}
      ];
    } else if(isPDF){
      msgContent=[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
        {type:'text',text:buildPrompt()}
      ];
    } else {
      alert('Desteklenmeyen format.');
      document.getElementById('fatura-progress').style.display='none';
      document.getElementById('oku-btn').disabled=false;
      return;
    }

    const parsed=await callClaude(msgContent);
    if(parsed)gosterOnay(parsed);

  }catch(e){
    alert('Hata: '+e.message);
  } finally {
    document.getElementById('fatura-progress').style.display='none';
    document.getElementById('oku-btn').disabled=false;
    input.value='';
  }
}

async function faturaOku(){
  const metin=document.getElementById('fatura-metin').value.trim();
  if(!metin){alert('Fatura metni boş.');return;}
  if(!apiKey){alert('Önce API Key gir.');return;}

  document.getElementById('fatura-progress').style.display='block';
  document.getElementById('oku-btn').disabled=true;
  setProgress(30,'AI analiz ediyor...');

  try{
    const parsed=await callClaude([{type:'text',text:buildPrompt()+'\n\nFATURA:\n'+metin}]);
    if(parsed)gosterOnay(parsed);
  }catch(e){
    alert('Hata: '+e.message);
  } finally {
    document.getElementById('fatura-progress').style.display='none';
    document.getElementById('oku-btn').disabled=false;
  }
}

function buildPrompt(){
  return `Bu bir Türk restoran faturasıdır. Sen deneyimli bir restoran maliyet uzmanısın. Her kalemi mutfakta kullanılabilir hale getir. SADECE JSON döndür, başka hiçbir şey yazma, markdown veya kod bloğu kullanma.

Format:
{"tedarikci":"firma adı","tarih":"YYYY-MM-DD","toplam":0,"kalemler":[{"temiz_ad":"kısa malzeme adı","fatura_adi":"faturadaki tam ad","marka":"marka veya null","kategori":"gida veya sarf","net_miktar":0,"temel_birim":"kg/lt/adet","koli_adet":0,"birim_fiyat_temel":0,"satir_tutari":0}]}

KURALLAR — çok önemli:

1) temiz_ad: Reçetede kullanılacak kısa, sade ad. Ambalaj/gramaj/marka YAZMA.
   "TEMİZLENMİŞ BTN KALAMAR 12KG" → "Kalamar"
   "KAANLAR MASCARPONE 400G" → "Mascarpone"
   "METRO CHEF SÜZME YOĞURT 5KG" → "Süzme Yoğurt"
   "PİLİÇ BUT IZGARA KG TB UFM" → "Piliç But"

2) temel_birim: Ağırlık ürünü ise "kg", sıvı ise "lt", sayılabilir ise "adet".
   Peynir/et/balık/un/şeker → kg. Yağ/süt/sirke → lt. Yumurta/ekmek → adet.

3) net_miktar: Ürünün TEMEL BİRİM cinsinden TOPLAM net içeriği (koli sayısı × ambalaj içeriği).
   "12KG kalamar, 1 adet alınmış" → net_miktar: 12, temel_birim: "kg"
   "MASCARPONE 400G, 5 adet alınmış" → net_miktar: 2 (5×0.4kg), temel_birim: "kg"
   "SÜZME YOĞURT 5KG, 2 adet" → net_miktar: 10, temel_birim: "kg"
   "YUMURTA 150Lİ, 1 adet" → net_miktar: 150, temel_birim: "adet"

4) birim_fiyat_temel: TEMEL BİRİM başına KDV DAHİL fiyat (satir_tutari ÷ net_miktar, KDV ekleyerek).
   Kalamar 11.605,20 TL + %1 KDV = 11.721 TL ÷ 12 kg ≈ 976,8 TL/kg
   Mascarpone: (2.550 + %1) ÷ 2 kg ≈ 1.287,75 TL/kg

5) kategori: Yemekte kullanılan her şey "gida". Temizlik/ambalaj/kömür/mendil/kase/camsil gibi yenmeyenler "sarf".

6) koli_adet: Faturada alınan paket/adet sayısı (bilgi amaçlı).

7) satir_tutari: O kalemin KDV dahil toplam tutarı.

Tüm kalemleri ekle, hiçbirini atlama.`;
}

async function callClaude(msgContent){
  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':apiKey,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:8000,
      messages:[{role:'user',content:msgContent}]
    })
  });

  setProgress(75,'Malzemeler kontrol ediliyor...');

  if(!resp.ok){
    const err=await resp.json().catch(()=>({}));
    throw new Error(err.error?.message||'API hatası: '+resp.status);
  }

  const data=await resp.json();
  const text=data.content.map(i=>i.text||'').join('');

  try{
    const clean=text.replace(/```json|```/g,'').trim();
    const m=clean.match(/\{[\s\S]*\}/);
    if(m)return JSON.parse(m[0]);
  }catch(e){
    console.error('Parse hatası',text);
    alert('AI yanıtı işlenemedi. Lütfen tekrar deneyin.');
    return null;
  }
}

function eslestir(temizAd,marka,faturaAdi){
  if(!temizAd&&!faturaAdi)return null;
  const aday=[temizAd,faturaAdi].filter(Boolean).map(s=>s.toLowerCase().trim());
  let best=null,bestScore=0;
  for(const m of DB.malzeme){
    const adlar=[m.ad,m.marka,...(m.alternatif_adlar||[])].filter(Boolean).map(s=>s.toLowerCase());
    for(const a of aday){
      for(const ad of adlar){
        if(a===ad){if(100>bestScore){bestScore=100;best=m;}}
        else if(a.includes(ad)||ad.includes(a)){if(70>bestScore){bestScore=70;best=m;}}
      }
    }
    if(bestScore===100)break;
  }
  return bestScore>=70?best:null;
}

function guncelleFiyat(m,fiyat,tarih){
  if(!fiyat||fiyat<=0)return;
  const yeniTarih=tarih||new Date().toISOString();
  if(!m.fiyat_gecmisi)m.fiyat_gecmisi=[];
  // Geçmişe ekle
  m.fiyat_gecmisi.unshift({fiyat,tarih:yeniTarih});
  // Tarihe göre sırala (en yeni en başta)
  m.fiyat_gecmisi.sort((a,b)=>new Date(b.tarih||0)-new Date(a.tarih||0));
  if(m.fiyat_gecmisi.length>24)m.fiyat_gecmisi=m.fiyat_gecmisi.slice(0,24);
  // son_fiyat = en güncel TARİHLİ alışın fiyatı (eski tarihli fatura sonradan yüklenirse üzerine yazmaz)
  const enGuncel=m.fiyat_gecmisi[0];
  m.son_fiyat=enGuncel.fiyat;
  m.fiyat_tarihi=enGuncel.tarih;
}

function onaylaFatura(){
  if(!_pendingFatura)return;
  const p=_pendingFatura;
  const tarih=p.tarih?new Date(p.tarih).toISOString():new Date().toISOString();
  const fatura={id:uid(),tarih,tedarikci:p.tedarikci||'',tutar:p.toplam||0,kalemler:[],eslesti:false};
  let esN=0,yeniN=0;
  const degisimler=[]; // fiyat değişimi olan malzemeler

  (p.kalemler||[]).forEach((k,i)=>{
    const cb=document.getElementById('cb-'+i);
    if(!cb||!cb.checked)return;
    const fiyat=k.birim_fiyat_temel||0;
    const esl=eslestir(k.temiz_ad,k.marka,k.fatura_adi);
    const kalem={ad:k.temiz_ad,fatura_adi:k.fatura_adi,marka:k.marka,miktar:k.net_miktar,birim:k.temel_birim,birim_fiyat:fiyat,malzeme_id:null};
    if(esl){
      const eskiFiyat=esl.son_fiyat||0;
      kalem.malzeme_id=esl.id;
      // Fiyat değişimini yakala (anlamlı bir değişim varsa)
      if(eskiFiyat>0&&fiyat>0&&Math.abs(fiyat-eskiFiyat)/eskiFiyat>=0.01){
        const yuzde=((fiyat-eskiFiyat)/eskiFiyat)*100;
        const etkilenen=DB.recete.filter(r=>receteIcerirMi(r,esl.id)).map(r=>r.ad);
        degisimler.push({ad:esl.ad,eski:eskiFiyat,yeni:fiyat,birim:esl.birim,yuzde,etkilenen});
      }
      guncelleFiyat(esl,fiyat,tarih);
      if(k.fatura_adi&&esl.ad!==k.fatura_adi){
        if(!esl.alternatif_adlar)esl.alternatif_adlar=[];
        if(!esl.alternatif_adlar.includes(k.fatura_adi))esl.alternatif_adlar.push(k.fatura_adi);
      }
      esN++;
    } else {
      const yeni={
        id:uid(),
        ad:k.temiz_ad||k.fatura_adi,
        marka:k.marka||'',
        alternatif_adlar:k.fatura_adi&&k.fatura_adi!==k.temiz_ad?[k.fatura_adi]:[],
        kategori:k.kategori==='sarf'?'Sarf':'Diğer',
        son_fiyat:fiyat,
        birim:k.temel_birim||'adet',
        tedarikci:p.tedarikci||'',
        fiyat_tarihi:tarih,
        fiyat_gecmisi:fiyat>0?[{fiyat,tarih}]:[]
      };
      DB.malzeme.push(yeni);
      kalem.malzeme_id=yeni.id;
      yeniN++;
    }
    fatura.kalemler.push(kalem);
  });

  fatura.eslesti=esN>0||yeniN>0;
  DB.fatura.unshift(fatura);
  saveDB();
  document.getElementById('onay-alan').innerHTML='';
  document.getElementById('fatura-metin').value='';
  _pendingFatura=null;
  render();

  // Fiyat değişimi varsa uyarı ekranı göster, yoksa basit özet
  if(degisimler.length){
    gosterFiyatDegisim(degisimler,esN,yeniN);
  } else {
    setTimeout(()=>alert(`✓ Fatura kaydedildi!\n${esN} malzeme fiyatı güncellendi\n${yeniN} yeni malzeme oluşturuldu`),100);
  }
}

// Bir reçete (alt reçeteleri dahil) belirli bir malzemeyi içeriyor mu?
function receteIcerirMi(r,malzemeId,_seen){
  _seen=_seen||{};
  if(_seen[r.id])return false;
  _seen[r.id]=true;
  if((r.malzemeler||[]).some(rm=>rm.malzeme_id===malzemeId))return true;
  return (r.alt_receteler||[]).some(ar=>{
    const sub=DB.recete.find(x=>x.id===ar.recete_id);
    return sub?receteIcerirMi(sub,malzemeId,{..._seen}):false;
  });
}

function gosterFiyatDegisim(degisimler,esN,yeniN){
  degisimler.sort((a,b)=>Math.abs(b.yuzde)-Math.abs(a.yuzde));
  const rows=degisimler.map(d=>{
    const yon=d.yuzde>0?'bad':'ok';
    const ok=d.yuzde>0?'▲':'▼';
    const etk=d.etkilenen.length
      ?`<div style="font-size:12px;color:var(--ink2);margin-top:4px">Etkilenen: ${d.etkilenen.join(', ')}</div>`
      :`<div style="font-size:12px;color:var(--ink3);margin-top:4px">Henüz reçetede kullanılmıyor</div>`;
    return `<div style="padding:14px;border-bottom:1px solid var(--line)">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <strong style="font-size:14px">${d.ad}</strong>
        <span class="badge ${yon}">${ok} %${fmt(Math.abs(d.yuzde),1)}</span>
      </div>
      <div style="font-size:13px;color:var(--ink2);margin-top:4px">
        ${fmtTL(d.eski)} → <strong style="color:var(--ink)">${fmtTL(d.yeni)}</strong> / ${d.birim}
      </div>
      ${etk}
    </div>`;
  }).join('');

  const zamSayisi=degisimler.filter(d=>d.yuzde>0).length;
  const indirimSayisi=degisimler.filter(d=>d.yuzde<0).length;

  const modal=document.getElementById('degisim-modal');
  document.getElementById('degisim-body').innerHTML=`
    <div class="info-box" style="margin:0 0 4px">
      Fatura kaydedildi. ${esN} fiyat güncellendi, ${yeniN} yeni malzeme eklendi.
      <strong>${degisimler.length} malzemenin fiyatı değişti</strong> (${zamSayisi} zam, ${indirimSayisi} indirim).
      Aşağıdaki reçetelerin maliyetleri otomatik güncellendi.
    </div>
    <div style="border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;margin-top:14px">${rows}</div>`;
  modal.style.display='flex';
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Dosya okunamadı'));
    r.readAsDataURL(file);
  });
}

/* ── MALZEME ── */
function malzemeRows(q){
  const list=DB.malzeme.filter(m=>!q||m.ad.toLowerCase().includes(q.toLowerCase())||(m.kategori||'').toLowerCase().includes(q.toLowerCase()));
  return list.length===0
    ?`<tr><td colspan="6"><div class="empty">${!DB.malzeme.length?'Fatura yükleyince otomatik oluşur. İstersen elle de ekleyebilirsin.':'Sonuç yok.'}</div></td></tr>`
    :list.map(m=>`<tr>
      <td><strong>${m.ad}</strong>${m.marka?`<br><small style="color:var(--text2)">${m.marka}</small>`:''}</td>
      <td><span class="badge info">${m.kategori||'—'}</span></td>
      <td class="num">${m.son_fiyat>0?`<strong>${fmtTL(m.son_fiyat)}</strong> / ${m.birim}`:'—'}</td>
      <td class="num" style="font-size:12px;color:var(--ink2)">${m.fiyat_tarihi?new Date(m.fiyat_tarihi).toLocaleDateString('tr-TR'):'—'}</td>
      <td style="font-size:12px;color:var(--text2)">${m.tedarikci||'—'}</td>
      <td style="display:flex;gap:6px">
        <button class="btn sm" onclick="editMalzeme('${m.id}')" title="Düzenle">✎</button>
        <button class="btn sm danger" onclick="deleteMalzeme('${m.id}')" title="Sil">✕</button>
      </td>
    </tr>`).join('');
}

function filterMalzeme(q){
  const tb=document.getElementById('malzeme-tbody');
  if(tb)tb.innerHTML=malzemeRows(q);
}

function editMalzeme(id){
  const m=DB.malzeme.find(x=>x.id===id);if(!m)return;
  render();
  setTimeout(()=>{
    document.getElementById('m-title').textContent='Malzeme Düzenle';
    document.getElementById('m-id').value=m.id;
    document.getElementById('m-ad').value=m.ad;
    document.getElementById('m-marka').value=m.marka||'';
    document.getElementById('m-alt').value=(m.alternatif_adlar||[]).join(', ');
    document.getElementById('m-kat').value=m.kategori||'';
    document.getElementById('m-fiyat').value=m.son_fiyat||'';
    document.getElementById('m-birim').value=m.birim||'kg';
    document.getElementById('m-ted').value=m.tedarikci||'';
    document.getElementById('m-tarih').value=m.fiyat_tarihi?new Date(m.fiyat_tarihi).toISOString().slice(0,10):new Date().toISOString().slice(0,10);
    document.getElementById('m-modal').style.display='flex';
  },10);
}

function saveMalzeme(){
  const id=document.getElementById('m-id').value;
  const ad=document.getElementById('m-ad').value.trim();
  if(!ad){alert('Malzeme adı zorunlu.');return;}
  const fiyat=parseFloat(document.getElementById('m-fiyat').value)||0;
  const tarihStr=document.getElementById('m-tarih').value;
  const tarih=tarihStr?new Date(tarihStr).toISOString():new Date().toISOString();
  const alt=document.getElementById('m-alt').value.split(',').map(s=>s.trim()).filter(Boolean);
  const obj={ad,marka:document.getElementById('m-marka').value.trim(),alternatif_adlar:alt,kategori:document.getElementById('m-kat').value,birim:document.getElementById('m-birim').value,tedarikci:document.getElementById('m-ted').value};
  if(id){
    const m=DB.malzeme.find(x=>x.id===id);
    if(m){
      Object.assign(m,obj);
      // Fiyat girilmişse tarih-bazlı güncelle
      if(fiyat>0)guncelleFiyat(m,fiyat,tarih);
    }
  } else {
    // Mükerrer kontrolü
    const mevcut=DB.malzeme.find(m=>{
      const adlar=[m.ad,...(m.alternatif_adlar||[])].map(s=>s.toLowerCase().trim());
      return adlar.includes(ad.toLowerCase().trim());
    });
    if(mevcut){
      const sec=confirm(`"${mevcut.ad}" zaten var (son fiyat: ${fmtTL(mevcut.son_fiyat)}/${mevcut.birim}).\n\nYeni bir kayıt oluşturmak yerine mevcut malzemenin fiyatını güncellemek ister misin?\n\nTamam = Mevcut malzemeyi güncelle\nİptal = Yine de yeni kayıt oluştur`);
      if(sec){
        if(fiyat>0)guncelleFiyat(mevcut,fiyat,tarih);
        if(obj.marka&&!mevcut.marka)mevcut.marka=obj.marka;
        if(obj.tedarikci&&!mevcut.tedarikci)mevcut.tedarikci=obj.tedarikci;
        alt.forEach(a=>{if(!mevcut.alternatif_adlar)mevcut.alternatif_adlar=[];if(!mevcut.alternatif_adlar.includes(a))mevcut.alternatif_adlar.push(a);});
        saveDB();
        document.getElementById('m-modal').style.display='none';
        render();
        return;
      }
    }
    DB.malzeme.push({id:uid(),...obj,son_fiyat:fiyat,fiyat_tarihi:fiyat>0?tarih:null,fiyat_gecmisi:fiyat>0?[{fiyat,tarih}]:[]});
  }
  saveDB();
  document.getElementById('m-modal').style.display='none';
  render();
}

function deleteMalzeme(id){
  // Bu malzeme reçetelerde kullanılıyor mu?
  const kullanan=DB.recete.filter(r=>(r.malzemeler||[]).some(rm=>rm.malzeme_id===id));
  if(kullanan.length){
    if(!confirm(`Bu malzeme ${kullanan.length} reçetede kullanılıyor (${kullanan.map(r=>r.ad).join(', ')}). Silersen o reçetelerden de çıkarılır. Devam edilsin mi?`))return;
    DB.recete.forEach(r=>{if(r.malzemeler)r.malzemeler=r.malzemeler.filter(rm=>rm.malzeme_id!==id);});
  } else {
    if(!confirm('Malzemeyi sil?'))return;
  }
  DB.malzeme=DB.malzeme.filter(x=>x.id!==id);
  saveDB();render();
}

function topluParse(metin){
  const satirlar=metin.split('\n').map(s=>s.trim()).filter(Boolean);
  const gecerliBirimler=['kg','gr','lt','ml','adet','paket','kutu','demet'];
  return satirlar.map(satir=>{
    // virgül veya tab ile ayır
    const parcalar=satir.split(/[,\t]/).map(s=>s.trim());
    const ad=parcalar[0]||'';
    const fiyat=parseFloat((parcalar[1]||'').replace(',','.'))||0;
    let birim=(parcalar[2]||'').toLowerCase();
    if(!gecerliBirimler.includes(birim))birim='adet';
    const tedarikci=parcalar[3]||'';
    return {ad,fiyat,birim,tedarikci,gecerli:!!ad};
  });
}

function topluKaydet(){
  const metin=document.getElementById('toplu-metin').value.trim();
  if(!metin){alert('Liste boş.');return;}
  const tarihStr=document.getElementById('toplu-tarih').value;
  const tarih=tarihStr?new Date(tarihStr).toISOString():new Date().toISOString();
  const satirlar=topluParse(metin).filter(s=>s.gecerli);
  if(!satirlar.length){alert('Geçerli satır bulunamadı.');return;}

  let yeniN=0,guncelN=0;
  satirlar.forEach(s=>{
    const mevcut=DB.malzeme.find(m=>{
      const adlar=[m.ad,...(m.alternatif_adlar||[])].map(x=>x.toLowerCase().trim());
      return adlar.includes(s.ad.toLowerCase().trim());
    });
    if(mevcut){
      if(s.fiyat>0)guncelleFiyat(mevcut,s.fiyat,tarih);
      if(s.tedarikci&&!mevcut.tedarikci)mevcut.tedarikci=s.tedarikci;
      guncelN++;
    } else {
      DB.malzeme.push({
        id:uid(),ad:s.ad,marka:'',alternatif_adlar:[],kategori:'Diğer',
        son_fiyat:s.fiyat,birim:s.birim,tedarikci:s.tedarikci,
        fiyat_tarihi:s.fiyat>0?tarih:null,
        fiyat_gecmisi:s.fiyat>0?[{fiyat:s.fiyat,tarih}]:[]
      });
      yeniN++;
    }
  });
  saveDB();
  document.getElementById('toplu-modal').style.display='none';
  render();
  setTimeout(()=>alert(`✓ İçe aktarıldı!\n${yeniN} yeni malzeme eklendi\n${guncelN} mevcut malzeme güncellendi`),100);
}


// Aynı isimli mükerrer malzemeleri birleştir
function mukerrerBirlestir(){
  const gruplar={};
  DB.malzeme.forEach(m=>{
    const anahtar=m.ad.toLowerCase().trim();
    if(!gruplar[anahtar])gruplar[anahtar]=[];
    gruplar[anahtar].push(m);
  });
  const cift=Object.values(gruplar).filter(g=>g.length>1);
  if(!cift.length){alert('Mükerrer (aynı isimli) malzeme bulunamadı.');return;}

  let toplam=0;
  cift.forEach(grup=>{
    // En güncel fiyatlısını ana kayıt seç
    grup.sort((a,b)=>new Date(b.fiyat_tarihi||0)-new Date(a.fiyat_tarihi||0));
    const ana=grup[0];
    const digerler=grup.slice(1);
    digerler.forEach(d=>{
      // Reçetelerdeki bağları ana kayda yönlendir
      DB.recete.forEach(r=>{
        (r.malzemeler||[]).forEach(rm=>{if(rm.malzeme_id===d.id)rm.malzeme_id=ana.id;});
      });
      // Alternatif adları ana kayda taşı
      [d.ad,...(d.alternatif_adlar||[])].forEach(a=>{
        if(!ana.alternatif_adlar)ana.alternatif_adlar=[];
        if(a!==ana.ad&&!ana.alternatif_adlar.includes(a))ana.alternatif_adlar.push(a);
      });
      toplam++;
    });
    // Diğer kayıtları sil
    const silinecek=digerler.map(d=>d.id);
    DB.malzeme=DB.malzeme.filter(m=>!silinecek.includes(m.id));
  });
  saveDB();render();
  alert(`✓ ${toplam} mükerrer kayıt birleştirildi. Reçete bağları korundu.`);
}

function receteCards(q,kat){
  let list=DB.recete;
  if(q)list=list.filter(r=>r.ad.toLowerCase().includes(q.toLowerCase()));
  if(kat)list=list.filter(r=>r.kategori===kat);
  if(!list.length)return `<div class="empty"><div class="big">${DB.recete.length===0?'Henüz reçete eklenmedi':'Sonuç bulunamadı'}</div>${DB.recete.length===0?'Sağ üstten ilk reçeteni ekle':''}</div>`;
  return list.map(r=>{
    const mc=hesapla(r);
    const bm=birimMaliyet(r);
    const mi=DB.menu_items.find(m=>m.recete_id===r.id);
    const pct=mi&&mi.fiyat>0?(mc/mi.fiyat)*100:null;
    const altSayisi=(r.alt_receteler||[]).length;
    const altRecepteMi=DB.recete.some(x=>(x.alt_receteler||[]).some(a=>a.recete_id===r.id));
    return `<div class="card" style="margin-bottom:12px">
      <div class="section-hd" style="margin-bottom:8px">
        <div style="min-width:0">
          <strong style="font-size:15px">${r.ad}</strong>
          ${altRecepteMi?'<span class="badge info" style="margin-left:6px">alt reçete</span>':''}
          <span style="font-size:12px;color:var(--ink2);margin-left:8px">${r.kategori||''} · ${fmt(r.porsiyon||1,2)} ${r.birim||'porsiyon'}</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
          ${pct!==null?`<span class="badge ${costBadge(pct)}">%${fmt(pct,1)} food cost</span>`:''}
          <div style="text-align:right">
            <strong class="num">${fmtTL(mc)}</strong>
            <div style="font-size:11px;color:var(--ink2)" class="num">${fmtTL(bm)}/${r.birim||'porsiyon'}</div>
          </div>
          <button class="btn sm" onclick="editRecete('${r.id}')" title="Düzenle">✎</button>
          <button class="btn sm" onclick="kopyalaRecete('${r.id}')" title="Kopyala">⧉</button>
          <button class="btn sm danger" onclick="deleteRecete('${r.id}')" title="Sil">✕</button>
        </div>
      </div>
      <div style="font-size:12px;color:var(--ink2)">${(r.malzemeler||[]).length} malzeme${altSayisi>0?' · '+altSayisi+' alt reçete':''}</div>
      ${pct!==null?`<div class="cost-bar-bg"><div class="cost-bar" style="width:${Math.min(pct,100)}%;background:${pct<=32?'var(--green)':pct<=40?'var(--amber)':'var(--red)'}"></div></div>`:''}
    </div>`;
  }).join('');
}

/* Combobox seçenek havuzu */
function comboOptions(type,idx){
  if(type==='rm'){
    return DB.malzeme.map(x=>({id:x.id,label:`${x.ad}${x.marka?' ('+x.marka+')':''}`,sub:`${fmtTL(x.son_fiyat)}/${x.birim}`}));
  } else {
    const editId=document.getElementById('r-id').value;
    return DB.recete.filter(x=>x.id!==editId).map(x=>({id:x.id,label:x.ad,sub:`${fmtTL(birimMaliyet(x))}/${x.birim||'porsiyon'}`}));
  }
}

let _comboFilter={};

function openCombo(type,idx){
  filterCombo(type,idx,'__ALL__');
}

function filterCombo(type,idx,q){
  // Input tamamen boşaltıldıysa seçimi temizle
  if(q!=='__ALL__'&&q.trim()===''){
    if(type==='rm')rMalzemeler[idx].malzeme_id='';
    else rAltReceteler[idx].recete_id='';
    const unitEl=document.getElementById(`${type}-unit-${idx}`);if(unitEl)unitEl.textContent='';
    onQtyChange(type,idx);
  }
  const listEl=document.getElementById(`${type}-list-${idx}`);
  if(!listEl)return;
  const all=comboOptions(type,idx);
  const query=(q==='__ALL__'?'':q).toLocaleLowerCase('tr');
  const filtered=query?all.filter(o=>o.label.toLocaleLowerCase('tr').includes(query)):all;
  _comboFilter[`${type}-${idx}`]=filtered;
  if(!filtered.length){
    listEl.innerHTML=`<div class="combo-empty">Sonuç yok</div>`;
  } else {
    listEl.innerHTML=filtered.slice(0,50).map((o,j)=>
      `<div class="combo-item" data-j="${j}" onmousedown="pickCombo('${type}',${idx},'${o.id}')">
        <span>${o.label}</span><span class="combo-sub">${o.sub}</span>
      </div>`
    ).join('');
  }
  listEl.style.display='block';
}

function pickCombo(type,idx,id){
  if(type==='rm'){rMalzemeler[idx].malzeme_id=id;}
  else{rAltReceteler[idx].recete_id=id;}
  const listEl=document.getElementById(`${type}-list-${idx}`);
  if(listEl)listEl.style.display='none';
  // input değerini ve birim/total'ı güncelle (tüm listeyi yeniden çizmeden)
  const arr=type==='rm'?rMalzemeler:rAltReceteler;
  const obj=type==='rm'?DB.malzeme.find(x=>x.id===id):DB.recete.find(x=>x.id===id);
  const inp=document.getElementById(`${type}-search-${idx}`);
  if(inp&&obj)inp.value=type==='rm'?`${obj.ad}${obj.marka?' ('+obj.marka+')':''}`:obj.ad;
  const unitEl=document.getElementById(`${type}-unit-${idx}`);
  if(unitEl&&obj)unitEl.textContent=type==='rm'?obj.birim:(obj.birim||'por');
  onQtyChange(type,idx);
}

function comboKey(e,type,idx){
  if(e.key==='Escape'){
    const listEl=document.getElementById(`${type}-list-${idx}`);
    if(listEl)listEl.style.display='none';
  } else if(e.key==='Enter'){
    e.preventDefault();
    const f=_comboFilter[`${type}-${idx}`];
    if(f&&f.length===1)pickCombo(type,idx,f[0].id);
  }
}

/* Miktar veya seçim değişince: sadece o satırın toplamını ve özeti güncelle, yeniden çizme YOK */
function onQtyChange(type,idx){
  if(type==='rm'){
    const rm=rMalzemeler[idx];
    const m=DB.malzeme.find(x=>x.id===rm.malzeme_id);
    const sat=m&&m.son_fiyat>0&&rm.miktar>0?m.son_fiyat*rm.miktar:0;
    const el=document.getElementById(`rm-total-${idx}`);if(el)el.textContent=sat>0?fmtTL(sat):'';
  } else {
    const ar=rAltReceteler[idx];
    const sub=DB.recete.find(x=>x.id===ar.recete_id);
    const sat=sub&&ar.miktar>0?birimMaliyet(sub)*ar.miktar:0;
    const el=document.getElementById(`ar-total-${idx}`);if(el)el.textContent=sat>0?fmtTL(sat):'';
  }
  guncellePreview();
}

/* Dışarı tıklayınca açık dropdownları kapat */
document.addEventListener('mousedown',function(e){
  if(!e.target.closest('.combo')){
    document.querySelectorAll('.combo-list').forEach(el=>el.style.display='none');
  }
});

function guncellePreview(){
  let t=0;
  rMalzemeler.forEach(rm=>{const m=DB.malzeme.find(x=>x.id===rm.malzeme_id);if(m&&m.son_fiyat>0&&rm.miktar>0)t+=m.son_fiyat*rm.miktar;});
  rAltReceteler.forEach(ar=>{const sub=DB.recete.find(x=>x.id===ar.recete_id);if(sub&&ar.miktar>0)t+=birimMaliyet(sub)*ar.miktar;});
  const pors=parseFloat(document.getElementById('r-pors').value)||1;
  const birim=document.getElementById('r-birim').value||'porsiyon';
  const bm=t/pors;
  const pv=document.getElementById('r-prev');
  if(pv){
    pv.style.display='block';
    document.getElementById('r-prev-val').textContent=fmtTL(t);
    document.getElementById('r-prev-birim').textContent=fmtTL(bm)+' / '+birim;
  }
  // Hedef fiyat canlı hesabı
  const hedefEl=document.getElementById('r-hedef');
  const calc=document.getElementById('r-hedef-calc');
  const hedef=parseFloat(hedefEl?hedefEl.value:0)||0;
  if(calc){
    if(hedef>0){
      const kar=hedef-bm;
      const fc=(bm/hedef)*100;
      calc.style.display='grid';
      document.getElementById('hc-mc').textContent=fmtTL(bm);
      const karEl=document.getElementById('hc-kar');
      karEl.textContent=fmtTL(kar);karEl.className='lc-val num '+(kar>=0?'cost-ok':'cost-bad');
      const fcEl=document.getElementById('hc-fc');
      fcEl.textContent='%'+fmt(fc,1);fcEl.className='lc-val num '+costColor(fc);
    } else {
      calc.style.display='none';
    }
  }
}

function addRM(){rMalzemeler.push({malzeme_id:'',miktar:0});renderRMList();setTimeout(()=>{const el=document.getElementById('rm-search-'+(rMalzemeler.length-1));if(el)el.focus();},20);}
function remRM(i){rMalzemeler.splice(i,1);renderRMList();}
function addAR(){rAltReceteler.push({recete_id:'',miktar:0});renderRMList();setTimeout(()=>{const el=document.getElementById('ar-search-'+(rAltReceteler.length-1));if(el)el.focus();},20);}
function remAR(i){rAltReceteler.splice(i,1);renderRMList();}

function openAddRecete(){
  rMalzemeler=[];rAltReceteler=[];render();
  setTimeout(()=>{
    document.getElementById('r-title').textContent='Reçete Ekle';
    ['r-id','r-ad','r-hedef'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('r-pors').value='1';
    document.getElementById('r-birim').value='porsiyon';
    document.getElementById('r-kat').value='';
    renderRMList();
    document.getElementById('r-modal').style.display='flex';
  },10);
}

function editRecete(id){
  const r=DB.recete.find(x=>x.id===id);if(!r)return;
  rMalzemeler=(r.malzemeler||[]).map(rm=>({...rm}));
  rAltReceteler=(r.alt_receteler||[]).map(ar=>({...ar}));
  render();
  setTimeout(()=>{
    document.getElementById('r-title').textContent='Reçete Düzenle';
    document.getElementById('r-id').value=r.id;
    document.getElementById('r-ad').value=r.ad;
    document.getElementById('r-pors').value=r.porsiyon||1;
    document.getElementById('r-birim').value=r.birim||'porsiyon';
    document.getElementById('r-kat').value=r.kategori||'';
    // Menüde bağlı fiyat varsa hedef olarak göster
    const mi=DB.menu_items.find(m=>m.recete_id===r.id);
    document.getElementById('r-hedef').value=mi&&mi.fiyat?mi.fiyat:'';
    renderRMList();
    document.getElementById('r-modal').style.display='flex';
  },10);
}

function kopyalaRecete(id){
  const r=DB.recete.find(x=>x.id===id);if(!r)return;
  const kopya={
    id:uid(),
    ad:r.ad+' (kopya)',
    porsiyon:r.porsiyon||1,
    birim:r.birim||'porsiyon',
    kategori:r.kategori||'',
    malzemeler:(r.malzemeler||[]).map(rm=>({...rm})),
    alt_receteler:(r.alt_receteler||[]).map(ar=>({...ar}))
  };
  DB.recete.push(kopya);
  saveDB();render();
  setTimeout(()=>editRecete(kopya.id),100);
}

function saveRecete(){
  const id=document.getElementById('r-id').value;
  const ad=document.getElementById('r-ad').value.trim();
  if(!ad){alert('Reçete adı zorunlu.');return;}
  const malzemeler=rMalzemeler.filter(rm=>rm.malzeme_id&&rm.miktar>0).map(rm=>({malzeme_id:rm.malzeme_id,miktar:rm.miktar}));
  const alt_receteler=rAltReceteler.filter(ar=>ar.recete_id&&ar.miktar>0).map(ar=>({recete_id:ar.recete_id,miktar:ar.miktar}));
  const obj={
    ad,
    porsiyon:parseFloat(document.getElementById('r-pors').value)||1,
    birim:document.getElementById('r-birim').value||'porsiyon',
    kategori:document.getElementById('r-kat').value,
    malzemeler,
    alt_receteler
  };
  if(id){const r=DB.recete.find(x=>x.id===id);if(r)Object.assign(r,obj);}
  else DB.recete.push({id:uid(),...obj});
  saveDB();
  document.getElementById('r-modal').style.display='none';
  render();
}

function deleteRecete(id){
  const kullananlar=DB.recete.filter(x=>(x.alt_receteler||[]).some(a=>a.recete_id===id));
  if(kullananlar.length){
    if(!confirm(`Bu reçete ${kullananlar.length} başka reçetede alt reçete olarak kullanılıyor (${kullananlar.map(x=>x.ad).join(', ')}). Yine de silmek istiyor musun? O reçetelerden de çıkarılacak.`))return;
    DB.recete.forEach(x=>{if(x.alt_receteler)x.alt_receteler=x.alt_receteler.filter(a=>a.recete_id!==id);});
  } else {
    if(!confirm('Reçeteyi sil?'))return;
  }
  DB.recete=DB.recete.filter(x=>x.id!==id);
  DB.menu_items=DB.menu_items.filter(x=>x.recete_id!==id);
  saveDB();render();
}

/* ── MENÜ ── */
function renderMenu(){
  const rows=DB.menu_items.length===0
    ?`<div class="empty">Henüz menü ürünü eklenmedi</div>`
    :`<div class="card" style="padding:0;overflow:hidden"><table>
      <thead><tr><th>Ürün</th><th>Reçete</th><th>Maliyet</th><th>Satış</th><th>Kar</th><th>Food Cost</th><th></th></tr></thead>
      <tbody>${DB.menu_items.map(m=>{
        const r=DB.recete.find(x=>x.id===m.recete_id);
        const mc=r?hesapla(r):0;
        const pct=m.fiyat>0?(mc/m.fiyat)*100:0;
        const kar=m.fiyat-mc;
        return `<tr>
          <td><strong>${m.ad}</strong>${m.kategori?`<br><small style="color:var(--text2)">${m.kategori}</small>`:''}</td>
          <td style="font-size:12px">${r?r.ad:`<span style="color:var(--red)">Reçete yok</span>`}</td>
          <td>${fmtTL(mc)}</td>
          <td><strong>${fmtTL(m.fiyat)}</strong></td>
          <td class="${kar>=0?'cost-ok':'cost-bad'}">${fmtTL(kar)}</td>
          <td><span class="badge ${costBadge(pct)}">%${fmt(pct,1)}</span></td>
          <td style="display:flex;gap:6px">
            <button class="btn sm" onclick="editMI('${m.id}')">Düzenle</button>
            <button class="btn sm danger" onclick="deleteMI('${m.id}')">Sil</button>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;

  return `<div class="page active">
    <div class="page-head"><h2>Menü & Fiyat</h2><p>Satış fiyatları ve canlı karlılık analizi</p></div>
    <div class="section-hd">
      <div></div>
      <button class="btn primary" onclick="openAddMI()">+ Ürün Ekle</button>
    </div>
    ${rows}
    ${renderMIModal()}
  </div>`;
}

  return `<div id="mi-modal" class="modal-bg" style="display:none">
    <div class="modal">
      <div class="modal-head"><h3 id="mi-title">Menü Ürünü Ekle</h3>
        <button class="modal-close" onclick="document.getElementById('mi-modal').style.display='none'">×</button>

function previewMI(){
  const rid=document.getElementById('mi-recete').value;
  const fiyat=parseFloat(document.getElementById('mi-fiyat').value)||0;
  const pv=document.getElementById('mi-prev');
  if(!rid||fiyat<=0){if(pv)pv.style.display='none';return;}
  const r=DB.recete.find(x=>x.id===rid);if(!r){if(pv)pv.style.display='none';return;}
  const mc=hesapla(r);const kar=fiyat-mc;const pct=(mc/fiyat)*100;
  if(pv){
    pv.style.display='grid';
    document.getElementById('mi-mc').textContent=fmtTL(mc);
    const k=document.getElementById('mi-kar');k.textContent=fmtTL(kar);k.className='lc-val num '+(kar>=0?'cost-ok':'cost-bad');
    const p=document.getElementById('mi-pct');p.textContent='%'+fmt(pct,1);p.className='lc-val num '+costColor(pct);
  }
}

function openAddMI(){
  render();
  setTimeout(()=>{
    document.getElementById('mi-title').textContent='Menü Ürünü Ekle';
    ['mi-id','mi-ad','mi-fiyat'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('mi-recete').value='';
    document.getElementById('mi-kat').value='';
    document.getElementById('mi-modal').style.display='flex';
  },10);
}

function editMI(id){
  const m=DB.menu_items.find(x=>x.id===id);if(!m)return;
  render();
  setTimeout(()=>{
    document.getElementById('mi-title').textContent='Ürün Düzenle';
    document.getElementById('mi-id').value=m.id;
    document.getElementById('mi-ad').value=m.ad;
    document.getElementById('mi-recete').value=m.recete_id||'';
    document.getElementById('mi-kat').value=m.kategori||'';
    document.getElementById('mi-fiyat').value=m.fiyat||'';
    document.getElementById('mi-modal').style.display='flex';
    previewMI();
  },10);
}

function saveMI(){
  const id=document.getElementById('mi-id').value;
  const ad=document.getElementById('mi-ad').value.trim();
  const fiyat=parseFloat(document.getElementById('mi-fiyat').value)||0;
  if(!ad||fiyat<=0){alert('Ürün adı ve satış fiyatı zorunlu.');return;}
  const obj={ad,recete_id:document.getElementById('mi-recete').value||null,kategori:document.getElementById('mi-kat').value,fiyat};
  if(id){const m=DB.menu_items.find(x=>x.id===id);if(m)Object.assign(m,obj);}
  else DB.menu_items.push({id:uid(),...obj});
  saveDB();
  document.getElementById('mi-modal').style.display='none';
  render();
}

function deleteMI(id){
  if(!confirm('Menü ürününü sil?'))return;
  DB.menu_items=DB.menu_items.filter(x=>x.id!==id);
  saveDB();render();
}
